version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"
          - "pre-commit*"
          - "bandit*"
          - "pip-audit*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
