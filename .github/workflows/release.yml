# Release workflow — stub until v0.1.0
#
# Triggered on version tags (v*.*.*).
# Planned steps:
#   1. uv build
#   2. Publish to PyPI (PYPI_API_TOKEN secret)
#   3. Create GitHub Release with CHANGELOG excerpt

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: false  # Enable when ready to publish v0.1.0
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

