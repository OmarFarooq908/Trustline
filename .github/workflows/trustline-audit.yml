name: Trustline Audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: trustline-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Trustline
        run: uv sync --all-extras --dev

      - name: Validate contracts
        run: uv run trustline validate --contracts ./examples/acme_stream/contracts/

      - name: Run DuckDB trust audit
        run: |
          exit_code=0
          uv run trustline audit \
            --contracts ./examples/acme_stream/contracts/ \
            --target duckdb \
            --profiles ./examples/acme_stream/profiles.yml.example \
            || exit_code=$?
          if [ "$exit_code" -ne 1 ]; then
            echo "Expected ACME demo audit to exit 1, got ${exit_code}"
            exit "$exit_code"
          fi
