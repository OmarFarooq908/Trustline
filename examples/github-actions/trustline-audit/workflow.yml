# Example workflow — install Trustline from PyPI and audit your scaffolded contracts.
# Copy to .github/workflows/trustline-audit.yml in your project.
# Prerequisite: run `trustline init --preset ml-crm-boundary` and commit ./trustline/

name: Trustline Audit

on:
  pull_request:
    paths:
      - "trustline/**"
  push:
    branches: [main]
    paths:
      - "trustline/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Trustline
        run: pip install trustline

      - name: Validate contracts
        run: trustline validate --contracts ./trustline/contracts

  audit:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Trustline
        run: pip install trustline

      - name: Smoke test bundled demo
        run: |
          exit_code=0
          trustline audit --demo || exit_code=$?
          if [ "$exit_code" -ne 1 ]; then
            echo "Expected demo audit to exit 1, got ${exit_code}"
            exit "$exit_code"
          fi

      - name: Compile checks for project contracts (dry run)
        run: |
          trustline audit \
            --contracts ./trustline/contracts \
            --profiles ./trustline/profiles.yml \
            --dry-run
